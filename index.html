<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CareConnect | Healthcare at Your Fingertips</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
scroll-behavior:smooth;
}

body{
background:#f4f8fc;
color:#222;
}

header{
position:fixed;
top:0;
width:100%;
background:rgba(255,255,255,.95);
backdrop-filter:blur(10px);
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 8%;
box-shadow:0 5px 20px rgba(0,0,0,.08);
z-index:1000;
}

.logo{
font-size:30px;
font-weight:700;
color:#0d6efd;
}

nav a{
text-decoration:none;
color:#222;
margin-left:30px;
font-weight:500;
transition:.3s;
}

nav a:hover{
color:#0d6efd;
}

.hero{
min-height:100vh;
display:flex;
align-items:center;
justify-content:space-between;
padding:120px 8%;
background:linear-gradient(135deg,#0d6efd,#00b4ff);
color:white;
}

.hero-text{
max-width:650px;
}

.hero-text h1{
font-size:70px;
line-height:1.2;
margin-bottom:20px;
}

.hero-text p{
font-size:20px;
line-height:1.8;
margin-bottom:40px;
}

.buttons{
display:flex;
gap:20px;
}

.btn1{
background:white;
color:#0d6efd;
padding:16px 35px;
border:none;
border-radius:50px;
font-size:18px;
font-weight:600;
cursor:pointer;
transition:.4s;
}

.btn1:hover{
transform:translateY(-5px);
}

.btn2{
background:transparent;
border:2px solid white;
color:white;
padding:16px 35px;
border-radius:50px;
font-size:18px;
font-weight:600;
cursor:pointer;
transition:.4s;
}

.btn2:hover{
background:white;
color:#0d6efd;
}

.hero-image img{
width:500px;
}

.stats{
padding:100px 8%;
display:flex;
justify-content:center;
gap:30px;
flex-wrap:wrap;
background:white;
}

.stat-card{
width:250px;
background:white;
padding:40px;
border-radius:25px;
box-shadow:0 10px 30px rgba(0,0,0,.08);
text-align:center;
transition:.4s;
}

.stat-card:hover{
transform:translateY(-10px);
}

.stat-card h1{
font-size:45px;
color:#0d6efd;
margin-bottom:10px;
}

.stat-card p{
font-size:18px;
}

@media(max-width:900px){

.hero{
flex-direction:column;
text-align:center;
padding-top:150px;
}

.hero-text h1{
font-size:45px;
}

.hero-image img{
width:320px;
margin-top:40px;
}

header{
flex-direction:column;
}

nav{
margin-top:15px;
}

nav a{
margin:0 10px;
}

}

</style>
</head>

<body>

<header>

<div class="logo">
🏥 CareConnect
</div>

<nav>

<a href="#">Home</a>
<a href="#">Services</a>
<a href="#">Partners</a>
<a href="#">Appointments</a>
<a href="#">Contact</a>

</nav>

</header>


<section class="hero">

<div class="hero-text">

<h1>
Healthcare<br>
at Your Fingertips
</h1>

<p>
Connecting Patients, Doctors, Hospitals and Labs through one smart healthcare platform.
</p>

<div class="buttons">

<button class="btn1">
Book Appointment
</button>

<button class="btn2">
Partner With Us
</button>

</div>

</div>

<div class="hero-image">

<img src="https://cdn-icons-png.flaticon.com/512/3774/3774299.png">

</div>

</section>


<section class="stats">

<div class="stat-card">

<h1>5+</h1>

<p>Partner Clinics</p>

</div>

<div class="stat-card">

<h1>1+</h1>

<p>Diagnostic Lab</p>

</div>

<div class="stat-card">

<h1>24×7</h1>

<p>Support</p>

</div>

<div class="stat-card">

<h1>100%</h1>

<p>Commitment</p>

</div>

</section>

</body>
</html>
